<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動程式設計期中報告 - 考試排程系統</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333333;
            --title-black: #000000;
            --title-gray: #777777;
            --panel-bg: #ffffff;
            --border-color: #dddddd;
            --primary-color: #0056b3;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --title-black: #ffffff;
            --title-gray: #aaaaaa;
            --panel-bg: #2d2d2d;
            --border-color: #444444;
            --primary-color: #4dabf7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 3分鐘警告的背景動畫 */
        .warning-active {
            animation: warningPulse 1s infinite alternate;
        }
        @keyframes warningPulse {
            from { background-color: var(--bg-color); }
            to { background-color: #ff4c4c; }
        }

        /* 標題與選單列 */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 10px;
            padding-top: 20px;
        }

        .menu-btn {
            position: absolute;
            left: 0;
            text-decoration: none;
            background: var(--primary-color);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
        }

        header h1 {
            margin: 0;
            font-size: 1.8em;
        }
        header h1 .title-black { color: var(--title-black); }
        header h1 .title-gray { color: var(--title-gray); }

        .subtitle {
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        /* 控制按鈕區 (5個按鈕) */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }

        button {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }
        button:hover {
            background-color: var(--border-color);
        }
        button.active {
            border-color: var(--primary-color);
            background-color: rgba(0, 86, 179, 0.1);
        }

        /* 時鐘/倒數顯示區 */
        .time-display {
            font-size: 4em;
            font-weight: bold;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
            text-align: center;
        }
        .time-label {
            font-size: 0.3em;
            display: block;
            color: var(--title-gray);
            margin-bottom: -10px;
        }

        /* 考科列表與新增按鈕 */
        .exam-section {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
        }
        .add-btn {
            width: 100%;
            justify-content: center;
            background-color: var(--primary-color);
            color: white;
            border: none;
            margin-bottom: 15px;
        }
        .add-btn:hover { background-color: #004494; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { background-color: rgba(0,0,0,0.05); }
        body.dark-mode th { background-color: rgba(255,255,255,0.05); }
        
        /* 注音標籤控制 */
        rt {
            display: none;
            font-size: 0.5em;
            color: var(--title-gray);
        }
        .show-zhuyin rt {
            display: block;
        }

        /* 彈出視窗 (Dialog) */
        dialog {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            max-width: 400px;
            width: 90%;
        }
        dialog::backdrop {
            background: rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 10px; }

        @media (max-width: 600px) {
            .time-display { font-size: 3em; }
            header h1 { font-size: 1.4em; }
            .subtitle { font-size: 1em; }
            .controls button { font-size: 0.9em; padding: 8px 10px; }
            th, td { padding: 8px; font-size: 0.9em; }
        }
    </style>
</head>
<body>

    <header>
        <a href="https://www.et.tku.edu.tw/" target="_blank" class="menu-btn">☰ 淡江教科</a>
        <h1>
            <span class="title-black"><ruby>考<rt>ㄎㄠˇ</rt></ruby><ruby>試<rt>ㄕˋ</rt></ruby></span><span class="title-gray"><ruby>系<rt>ㄒㄧˋ</rt></ruby><ruby>統<rt>ㄊㄨㄥˇ</rt></ruby></span>
        </h1>
    </header>

    <div class="subtitle">
        <ruby>114<rt></rt></ruby><ruby>學<rt>ㄒㄩㄝˊ</rt></ruby><ruby>年<rt>ㄋㄧㄢˊ</rt></ruby><ruby>度<rt>ㄉㄨˋ</rt></ruby><ruby>第<rt>ㄉㄧˋ</rt></ruby><ruby>二<rt>ㄦˋ</rt></ruby><ruby>學<rt>ㄒㄩㄝˊ</rt></ruby><ruby>期<rt>ㄑㄧˊ</rt></ruby><ruby>互<rt>ㄏㄨˋ</rt></ruby><ruby>動<rt>ㄉㄨㄥˋ</rt></ruby><ruby>程<rt>ㄔㄥˊ</rt></ruby><ruby>式<rt>ㄕˋ</rt></ruby><ruby>設<rt>ㄕㄜˋ</rt></ruby><ruby>計<rt>ㄐㄧˋ</rt></ruby><ruby>期<rt>ㄑㄧˊ</rt></ruby><ruby>中<rt>ㄓㄨㄥ</rt></ruby><ruby>報<rt>ㄅㄠˋ</rt></ruby><ruby>告<rt>ㄍㄠˋ</rt></ruby>
    </div>

    <!-- 五個控制按鈕 -->
    <div class="controls">
        <button id="btn-time-mode">⏱️ <ruby>倒<rt>ㄉㄠˇ</rt></ruby><ruby>數<rt>ㄕㄨˋ</rt></ruby></button>
        <button id="btn-zhuyin">🔤 <ruby>注<rt>ㄓㄨˋ</rt></ruby><ruby>音<rt>ㄧㄣ</rt></ruby></button>
        <button id="btn-theme">🌙 <ruby>夜<rt>ㄧㄝˋ</rt></ruby><ruby>間<rt>ㄐㄧㄢ</rt></ruby></button>
        <button id="btn-sound">🔔 <ruby>鈴<rt>ㄌㄧㄥˊ</rt></ruby><ruby>聲<rt>ㄕㄥ</rt></ruby></button>
        <button id="btn-warning">⚠️ <ruby>警<rt>ㄐㄧㄥˇ</rt></ruby><ruby>告<rt>ㄍㄠˋ</rt></ruby></button>
    </div>

    <!-- 時間顯示區 -->
    <div class="time-display">
        <span class="time-label" id="time-label"><ruby>現<rt>ㄒㄧㄢˋ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>時<rt>ㄕˊ</rt></ruby><ruby>間<rt>ㄐㄧㄢ</rt></ruby></span>
        <span id="time-text">00:00:00</span>
    </div>

    <!-- 考科與時刻表區 -->
    <div class="exam-section">
        <button class="add-btn" id="btn-add-exam">➕ <ruby>新<rt>ㄒㄧㄣ</rt></ruby><ruby>增<rt>ㄗㄥ</rt></ruby><ruby>考<rt>ㄎㄠˇ</rt></ruby><ruby>科<rt>ㄎㄜ</rt></ruby></button>
        <table>
            <thead>
                <tr>
                    <th><ruby>時<rt>ㄕˊ</rt></ruby><ruby>間<rt>ㄐㄧㄢ</rt></ruby></th>
                    <th><ruby>科<rt>ㄎㄜ</rt></ruby><ruby>目<rt>ㄇㄨˋ</rt></ruby></th>
                    <th><ruby>監<rt>ㄐㄧㄢ</rt></ruby><ruby>考<rt>ㄎㄠˇ</rt></ruby><ruby>老<rt>ㄌㄠˇ</rt></ruby><ruby>師<rt>ㄕ</rt></ruby></th>
                </tr>
            </thead>
            <tbody id="exam-list">
                <!-- 考科列表會動態產生在這裡 -->
            </tbody>
        </table>
    </div>

    <!-- 新增考科的彈出視窗 -->
    <dialog id="exam-modal">
        <h3 style="margin-top:0;">新增考試排程</h3>
        <form id="exam-form">
            <div class="form-group">
                <label>時間 (HH:MM)</label>
                <input type="time" id="input-time" required>
            </div>
            <div class="form-group">
                <label>科目名稱</label>
                <input type="text" id="input-subject" required>
            </div>
            <div class="form-group">
                <label>監考老師</label>
                <input type="text" id="input-teacher" required>
            </div>
            <div class="dialog-actions">
                <button type="button" id="btn-cancel-modal">取消</button>
                <button type="submit" style="background:var(--primary-color); color:white;">儲存</button>
            </div>
        </form>
    </dialog>

<script>
    // 系統狀態變數
    let state = {
        isCountdown: false,
        showZhuyin: false,
        isDarkMode: false,
        soundEnabled: false,
        warningEnabled: false
    };

    // 儲存考試排程 [{time: "14:30", subject: "數學", teacher: "王老師", notified: false}]
    let exams = [];

    // DOM 元素取得
    const btnTimeMode = document.getElementById('btn-time-mode');
    const btnZhuyin = document.getElementById('btn-zhuyin');
    const btnTheme = document.getElementById('btn-theme');
    const btnSound = document.getElementById('btn-sound');
    const btnWarning = document.getElementById('btn-warning');
    
    const timeText = document.getElementById('time-text');
    const timeLabel = document.getElementById('time-label');
    const examList = document.getElementById('exam-list');
    
    const modal = document.getElementById('exam-modal');
    const btnAddExam = document.getElementById('btn-add-exam');
    const btnCancelModal = document.getElementById('btn-cancel-modal');
    const examForm = document.getElementById('exam-form');

    // 初始化與綁定事件
    function init() {
        btnTimeMode.addEventListener('click', toggleTimeMode);
        btnZhuyin.addEventListener('click', toggleZhuyin);
        btnTheme.addEventListener('click', toggleTheme);
        btnSound.addEventListener('click', toggleSound);
        btnWarning.addEventListener('click', toggleWarning);

        btnAddExam.addEventListener('click', () => modal.showModal());
        btnCancelModal.addEventListener('click', () => modal.close());
        examForm.addEventListener('submit', handleAddExam);

        // 每秒更新時鐘/倒數
        setInterval(updateClock, 1000);
        updateClock();
    }

    // 切換：時間 / 倒數計時
    function toggleTimeMode() {
        state.isCountdown = !state.isCountdown;
        btnTimeMode.classList.toggle('active', state.isCountdown);
        timeLabel.innerHTML = state.isCountdown 
            ? '<ruby>距<rt>ㄐㄩˋ</rt></ruby><ruby>離<rt>ㄌㄧˊ</rt></ruby><ruby>下<rt>ㄒㄧㄚˋ</rt></ruby><ruby>場<rt>ㄔㄤˇ</rt></ruby><ruby>考<rt>ㄎㄠˇ</rt></ruby><ruby>試<rt>ㄕˋ</rt></ruby>' 
            : '<ruby>現<rt>ㄒㄧㄢˋ</rt></ruby><ruby>在<rt>ㄗㄞˋ</rt></ruby><ruby>時<rt>ㄕˊ</rt></ruby><ruby>間<rt>ㄐㄧㄢ</rt></ruby>';
        updateClock();
    }

    // 切換：注音符號顯示
    function toggleZhuyin() {
        state.showZhuyin = !state.showZhuyin;
        btnZhuyin.classList.toggle('active', state.showZhuyin);
        if(state.showZhuyin) {
            document.body.classList.add('show-zhuyin');
        } else {
            document.body.classList.remove('show-zhuyin');
        }
    }

    // 切換：深色/淺色模式
    function toggleTheme() {
        state.isDarkMode = !state.isDarkMode;
        btnTheme.classList.toggle('active', state.isDarkMode);
        btnTheme.innerHTML = state.isDarkMode ? '☀️ <ruby>白<rt>ㄅㄞˊ</rt></ruby><ruby>天<rt>ㄊㄧㄢ</rt></ruby>' : '🌙 <ruby>夜<rt>ㄧㄝˋ</rt></ruby><ruby>間<rt>ㄐㄧㄢ</rt></ruby>';
        if(state.isDarkMode) {
            document.body.classList.add('dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
        }
    }

    // 切換：時間到鈴聲
    function toggleSound() {
        state.soundEnabled = !state.soundEnabled;
        btnSound.classList.toggle('active', state.soundEnabled);
    }

    // 切換：3分鐘警告變色
    function toggleWarning() {
        state.warningEnabled = !state.warningEnabled;
        btnWarning.classList.toggle('active', state.warningEnabled);
        // 如果關閉設定，立即移除正在發生的警告動畫
        if(!state.warningEnabled) {
            document.body.classList.remove('warning-active');
        }
    }

    // 新增考試
    function handleAddExam(e) {
        e.preventDefault();
        const time = document.getElementById('input-time').value;
        const subject = document.getElementById('input-subject').value;
        const teacher = document.getElementById('input-teacher').value;

        exams.push({ time, subject, teacher, notified: false });
        // 依據時間排序
        exams.sort((a, b) => a.time.localeCompare(b.time));
        
        renderExamList();
        examForm.reset();
        modal.close();
    }

    // 繪製考試列表
    function renderExamList() {
        examList.innerHTML = '';
        exams.forEach(exam => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${exam.time}</td>
                <td>${exam.subject}</td>
                <td>${exam.teacher}</td>
            `;
            examList.appendChild(tr);
        });
    }

    // 產生提示嗶聲 (使用 Web Audio API，不需外部音檔)
    function playBeep() {
        if(!state.soundEnabled) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime); // 音高
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 1.5); // 播放 1.5 秒
    }

    // 時鐘與倒數核心邏輯
    function updateClock() {
        const now = new Date();
        
        if (!state.isCountdown) {
            // 顯示現在時間
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            timeText.textContent = `${hh}:${mm}:${ss}`;
            document.body.classList.remove('warning-active'); // 時鐘模式不顯示警告
        } else {
            // 倒數計時模式：找出下一個未到達時間的考試
            let nextExam = null;
            for(let i=0; i<exams.length; i++) {
                const [eHour, eMin] = exams[i].time.split(':');
                const examDate = new Date();
                examDate.setHours(eHour, eMin, 0, 0);
                
                if (examDate > now) {
                    nextExam = { data: exams[i], date: examDate };
                    break;
                } else if (!exams[i].notified && (now - examDate) < 2000) {
                    // 剛好到達時間，觸發鈴聲並標記已通知
                    exams[i].notified = true;
                    playBeep();
                }
            }

            if (nextExam) {
                const diffMs = nextExam.date - now;
                const totalSeconds = Math.floor(diffMs / 1000);
                
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                
                timeText.textContent = (h > 0 ? `${String(h).padStart(2,'0')}:` : '') + 
                                       `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                
                // 3分鐘 (180秒) 警告色判斷
                if (state.warningEnabled && totalSeconds <= 180 && totalSeconds > 0) {
                    document.body.classList.add('warning-active');
                } else {
                    document.body.classList.remove('warning-active');
                }
            } else {
                timeText.textContent = "--:--";
                document.body.classList.remove('warning-active');
            }
        }
    }

    // 啟動程式
    init();
</script>
</body>
</html>
